syntax = "proto3";

package agent;

option go_package = "github.com/k8s-dashboard/backend/proto/agent";

// Agent 服务定义
service AgentService {
  // 双向流式对话
  rpc Chat(stream ChatRequest) returns (stream ChatResponse);

  // 执行工具（用于用户审批后的工具执行）
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);

  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// 聊天请求
message ChatRequest {
  string session_id = 1;        // 会话 ID
  string content = 2;           // 用户消息内容
  string provider = 3;          // LLM 提供商（如 openai, anthropic）
  string model = 4;             // 模型名称（如 gpt-4o）

  // 工具审批响应
  oneof approval {
    ToolApproval tool_approval = 5;
  }
}

// 工具审批
message ToolApproval {
  string tool_call_id = 1;      // 工具调用 ID
  string decision = 2;          // 决定：approve, reject, edit
  string edited_arguments = 3;  // 编辑后的参数（decision=edit 时使用）
}

// 聊天响应
message ChatResponse {
  string type = 1;              // 消息类型
  string session_id = 2;        // 会话 ID

  oneof payload {
    string content = 3;         // type=chunk 时，流式文本内容
    ToolCall tool_call = 4;     // type=tool_call 时，工具调用信息
    ToolResult tool_result = 5; // type=tool_result 时，工具执行结果
    ApprovalRequest approval_request = 6;  // type=approval_request 时
    TodosUpdate todos_update = 7;          // type=todos_update 时
    SubAgentEvent subagent_event = 8;      // type=subagent_event 时
    string error = 9;           // type=error 时，错误信息
  }
}

// 消息类型枚举
// type 字段的可选值：
// - session: 会话创建
// - chunk: 流式文本块
// - tool_call: 工具调用开始
// - tool_result: 工具调用结果
// - approval_request: 需要用户审批
// - todos_update: TodoList 更新
// - subagent_event: 子 Agent 事件
// - done: 响应完成
// - error: 错误

// 工具调用
message ToolCall {
  string id = 1;                // 工具调用 ID
  string name = 2;              // 工具名称
  string arguments = 3;         // 参数 JSON 字符串
  string status = 4;            // 状态：pending, running, completed, failed
}

// 工具结果
message ToolResult {
  string id = 1;                // 工具调用 ID
  string name = 2;              // 工具名称
  string result = 3;            // 结果 JSON 字符串
  bool success = 4;             // 是否成功
  string error = 5;             // 错误信息（如果失败）
}

// 审批请求
message ApprovalRequest {
  string tool_call_id = 1;      // 工具调用 ID
  string tool_name = 2;         // 工具名称
  string description = 3;       // 操作描述
  string impact = 4;            // 影响说明
  string risk_level = 5;        // 风险等级：low, medium, high
  string arguments = 6;         // 参数 JSON 字符串
  repeated string allowed_decisions = 7;  // 允许的决定：approve, reject, edit
}

// TodoList 更新
message TodosUpdate {
  repeated TodoItem items = 1;
}

message TodoItem {
  string id = 1;
  string content = 2;
  string status = 3;            // pending, in_progress, completed
}

// 子 Agent 事件
message SubAgentEvent {
  string agent_name = 1;        // 子 Agent 名称
  string event_type = 2;        // 事件类型：start, end, message
  string content = 3;           // 事件内容
}

// 执行工具请求
message ExecuteToolRequest {
  string session_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string arguments = 4;
}

// 执行工具响应
message ExecuteToolResponse {
  bool success = 1;
  string result = 2;
  string error = 3;
}

// 健康检查请求
message HealthCheckRequest {}

// 健康检查响应
message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  map<string, string> details = 3;
}
